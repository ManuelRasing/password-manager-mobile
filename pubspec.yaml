name: password_manager
description: Personal password manager mobile app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Networking
  http: ^1.2.2

  # Secure storage — uses Android Keystore / iOS Keychain
  flutter_secure_storage: ^9.2.2

  # HMAC-SHA256 request signing
  crypto: ^3.0.6

  # AES-256-GCM encryption (Phase 4)
  encrypt: ^5.0.3
  pointycastle: ^3.9.1

  # Biometric authentication (Face ID / fingerprint)
  local_auth: ^2.3.0

  # State management
  provider: ^6.1.5

  # Navigation
  go_router: ^14.8.1
  url_launcher: ^6.3.2
  android_intent_plus: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/icon/

# Run after replacing assets/icon/app_icon.png:
#   dart run flutter_launcher_icons
flutter_launcher_icons:
  android: "launcher_icon"        # generates res/mipmap-*/launcher_icon.png
  ios: true                       # rewrites ios/Runner/Assets.xcassets/AppIcon.appiconset
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 23
  # iOS rejects alpha channels — flatten transparent corners onto pale indigo.
  remove_alpha_ios: true
  background_color_ios: "#E8EAF6"
  # Android adaptive icons: solid pale-indigo background + the full image as foreground.
  # The launcher safely crops the foreground (circle / squircle / rounded square).
  adaptive_icon_background: "#E8EAF6"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
